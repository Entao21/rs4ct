project:
  type: website
  output-dir: docs
  # Copied into docs/ on every render (survives clean output-dir; edit fonts only in /fonts)
  resources:
    - "fonts"
    - "resources/pictures1"
    - "resources/pictures"
  render: 
    - "*.qmd"
    - "!week2slides.Rmd"

website:
  title: "CASA0023 Learning Diary"
  description: "A series of reflections on Remote Sensing for Cities and Environments Module"
  site-url: https://entao21.github.io/rs4ct/
  repo-url: https://github.com/entao21/rs4ct
  navbar:
    background: "#1c1c1c" 
    left:
      - href: index.qmd
        text: "About Me"
      - text: "Weekly Entries" 
        menu:
          - href: weeks/week1.qmd
            text: "Week 1: Getting Started"
          - href: weeks/week2.qmd
            text: "Week 2: Portfolio"
          - href: weeks/week3.qmd
            text: "Week 3: Corrections"
          - href: weeks/week4.qmd
            text: "Week 4: Policy"
    right:
      - icon: github
        href: https://github.com/Entao21/rs4ct
        aria-label: GitHub
  page-footer:
    left: 
      - text: "Back to top"
        href: "#" 
    right: 
      - "Entao21 © 2026 | All rights reserved" 
    border: true
    background: "#1c1c1c"
    foreground: "#f0eee9"

format:
  html:
    theme: 
      light: cosmo 
      dark: darkly 
    back-to-top-navigation: true
    smooth-scroll: true
    css: styles.css 
    toc: true
    toc-depth: 3
    number-sections: true 
    highlight-style: github
    code-copy: true 

editor: visual