project:
  type: website
  output-dir: docs
  # Copied into docs/ on every render (survives clean output-dir; edit fonts only in /fonts)
  resources:
    - "fonts"
    - "resources/pictures1"
    - "resources/pictures"
  render:
    - "*.qmd"
    - "weeks/*.qmd"
    - "!weeks/week2slides.Rmd"

website:
  title: "CASA0023 Learning Diary"
  description: "A series of reflections on Remote Sensing for Cities and Environments Module"
  site-url: https://entao21.github.io/rs4ct/
  repo-url: https://github.com/entao21/rs4ct
  # Left sidebar + top navbar dropdown (same week links in both places)
  sidebar:
    style: docked
    search: true
    collapse-level: 1
    contents:
      - text: "About Me"
        href: index.qmd
      - text: "1 Getting Started"
        href: weeks/week1.qmd
      - text: "2 Portfolio"
        href: weeks/week2.qmd
      - text: "3 Corrections"
        href: weeks/week3.qmd
      - text: "4 Policy"
        href: weeks/week4.qmd
      - text: "5 Google Earth Engine"
        href: weeks/week5.qmd
      - text: "6 Classification I"
        href: weeks/week6.qmd
      - text: "7 Classification II"
        href: weeks/week7.qmd
      - text: "8 Temperature"
        href: weeks/week8.qmd
      - text: "9 References & Final Words"
        href: weeks/week9.qmd
  navbar:
    background: "#1c1c1c" 
    left:
      - href: index.qmd
        text: "About Me"
      - text: "Weekly Entries"
        menu:
          - href: weeks/week1.qmd
            text: "Week 1: Getting Started"
          - href: weeks/week2.qmd
            text: "Week 2: Portfolio"
          - href: weeks/week3.qmd
            text: "Week 3: Corrections"
          - href: weeks/week4.qmd
            text: "Week 4: Policy"
          - href: weeks/week5.qmd
            text: "Week 5: Google Earth Engine"
          - href: weeks/week6.qmd
            text: "Week 6: Classification 1"
          - href: weeks/week7.qmd
            text: "Week 7: Classification 2"
          - href: weeks/week8.qmd
            text: "Week 8: Temperature"
          - href: weeks/week9.qmd
            text: "Week 9: References and Final Words"
    right:
      - icon: github
        href: https://github.com/Entao21/rs4ct
        aria-label: GitHub
  page-footer:
    left: 
      - text: "Back to top"
        href: "#" 
    right: 
      - "Entao21 © 2026 | All rights reserved" 
    border: true
    background: "#1c1c1c"
    foreground: "#f0eee9"

format:
  html:
    theme: 
      light: cosmo 
      dark: darkly 
    back-to-top-navigation: true
    smooth-scroll: true
    css: styles.css 
    toc: true
    toc-depth: 3
    number-sections: true 
    highlight-style: github
    code-copy: true 

editor: visual